<!DOCTYPE html>
<html>
<head>
<style>
body

}

  padding: 20px;

}

h1 {
  background-image: url('breakfast.jpg');

  color: white;

}

ul {

}

</head>

<body>

    <li>Orange Juice</li>
  </ul>

  <h2>Lunch</h2>
  <ul>
    <li>Sandwich</li>
    <li>Strawberries</li>
    <li>Carrots</li>
  </ul>

  <h2>Dinner</h2>

    <li>Pasta</li>

</html>
