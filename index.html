<!DOCTYPE html>
<html>

<head>
<style>

body{
    font-family: Arial, sans-serif;
    background-color: lightgray;
}

.menu{
    width: 400px;
    height: 550px;
    margin: 20px auto;
    padding: 20px;
    border: 3px solid black;
    color: white;
    background-size: cover;
    background-repeat: no-repeat;
}

.breakfast{
    background-image: url('breakfast.jpg');
}

.lunch{
    background-image: url('lunch.jpeg');
}

.dinner{
    background-image: url('dinner.jpg');
}

h1{
    text-align: center;
    background-color: rgba(0,0,0,0.5);
    padding: 10px;
}

ul{
    background-color: rgba(0,0,0,0.5);
    padding: 20px;
}

li{
    padding: 8px;
}

</style>
</head>

<body>

<div class="menu breakfast">
    <h1>Breakfast Menu</h1>
    <ul>
        <li>Eggs</li>
        <li>Bacon</li>
        <li>Orange Juice</li>
    </ul>
</div>

<div class="menu lunch">
    <h1>Lunch Menu</h1>
    <ul>
        <li>Sandwich</li>
        <li>Strawberries</li>
        <li>Carrots</li>
    </ul>
</div>

<div class="menu dinner">
    <h1>Dinner Menu</h1>
    <ul>
        <li>Pasta</li>
        <li>Broccoli</li>
        <li>Ice cream</li>
    </ul>
</div>

</body>
</html>
